services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: smartcity-postgres
    environment:
      POSTGRES_DB: smartcity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wadea1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartcity-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartcity-redis
    volumes:
      - redis_data:/data
    networks:
      - smartcity-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (local LLM for /analyze text-validation pass) ────────────────────

  ollama:
    image: ollama/ollama
    container_name: smartcity-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - smartcity-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # One-shot service: pulls qwen2.5:7b into the ollama volume on first run.
  # Safe to re-run — ollama skips the download if the model is already present.
  ollama-pull:
    image: ollama/ollama
    container_name: smartcity-ollama-pull
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:7b"]
    networks:
      - smartcity-net
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── Application Services ─────────────────────────────────────────────────────

  ai-service:
    build: ./smart-city-ai
    container_name: smartcity-ai
    ports:
      - "8000:8000"
    env_file: ./smart-city-ai/.env
    environment:
      # Point the ollama Python client at the ollama container
      OLLAMA_HOST: http://ollama:11434
    networks:
      - smartcity-net
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./backend/backend
    container_name: smartcity-backend
    ports:
      - "8080:8080"
    env_file: ./backend/backend/.env
    environment:
      # Override localhost references from .env with container names
      DB_HOST: postgres
      REDIS_HOST: redis
      AI_SERVICE_URL: http://ai-service:8000
    networks:
      - smartcity-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  smartcity-net:
    driver: bridge
